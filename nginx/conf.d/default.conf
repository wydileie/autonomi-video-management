limit_req_zone $binary_remote_addr zone=autvid_login:10m rate=5r/m;

map $http_x_forwarded_proto $autvid_hsts {
    default "";
    ~*^https$ "max-age=63072000; includeSubDomains; preload";
}

server {
    listen 8080;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 0;

    add_header X-Request-ID $request_id always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Strict-Transport-Security $autvid_hsts always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        set                $frontend_backend http://react_app:8080;
        proxy_pass         $frontend_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Request-ID $request_id;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /api/auth/login {
        limit_req          zone=autvid_login burst=5 nodelay;
        set                $api_backend http://rust_admin:8000;
        proxy_pass         $api_backend/auth/login;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Request-ID $request_id;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ~ ^/api/(.*)$ {
        set                $api_backend http://rust_admin:8000;
        proxy_pass         $api_backend/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Request-ID $request_id;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /stream/ {
        set                $stream_backend http://rust_stream:8081;
        proxy_pass         $stream_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Request-ID $request_id;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 120s;
    }
}
