# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main virtual host
server {
    listen 443 ssl;
    server_name va.worldwidenodes.cyou;

    ssl_certificate     /etc/letsencrypt/live/va.worldwidenodes.cyou/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/va.worldwidenodes.cyou/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 4096m;

    # ── React SPA ───────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://react_app:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Python admin API ────────────────────────────────────────────────────
    location /api/ {
        rewrite            ^/api/(.*)$ /$1 break;
        proxy_pass         http://python_admin:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Rust streaming service ──────────────────────────────────────────────
    location /stream/ {
        proxy_pass         http://rust_stream:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 120s;
    }

}
