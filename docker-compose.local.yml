services:
  antd:
    build:
      context: ./autonomi_devnet
    container_name: autonomi_local_devnet
    environment:
      ANT_DEVNET_PRESET: "${ANT_DEVNET_PRESET:-default}"
      ANTD_LOG_LEVEL: "${ANTD_LOG_LEVEL:-warn}"
      ANTD_QUOTE_TIMEOUT_SECS: "${ANTD_QUOTE_TIMEOUT_SECS:-60}"
      ANTD_STORE_TIMEOUT_SECS: "${ANTD_STORE_TIMEOUT_SECS:-120}"
    ports:
      - "${ANTD_REST_PORT:-8082}:8082"
      - "${ANTD_GRPC_PORT:-50051}:50051"
    networks:
      - appnet
    volumes:
      - autonomi_devnet_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s
    restart: unless-stopped

  python_admin:
    depends_on:
      antd:
        condition: service_healthy
    environment:
      ANTD_URL: "http://antd:8082"
      ANTD_APPROVE_ON_STARTUP: "false"
      HLS_SEGMENT_DURATION: "${HLS_SEGMENT_DURATION:-1}"
    ports:
      - "${ADMIN_HTTP_PORT:-8000}:8000"

  rust_stream:
    depends_on:
      antd:
        condition: service_healthy
    environment:
      ANTD_URL: "http://antd:8082"
    ports:
      - "${STREAM_HTTP_PORT:-8081}:8081"

volumes:
  autonomi_devnet_data:
