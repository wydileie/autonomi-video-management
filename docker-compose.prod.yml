services:
  db:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  antd:
    image: autonomi-video-management-antd-service
    build:
      context: .
      dockerfile: antd_service/Dockerfile
    container_name: antd_daemon
    environment:
      # For production secret-file use, mount the file with an optional
      # Compose override and set PROD_AUTONOMI_WALLET_KEY_FILE to its
      # in-container path, for example /run/secrets/autonomi_wallet_key.
      AUTONOMI_WALLET_KEY: "${PROD_AUTONOMI_WALLET_KEY:-}"
      AUTONOMI_WALLET_KEY_FILE: "${PROD_AUTONOMI_WALLET_KEY_FILE:-}"
      ANTD_NETWORK: "${PROD_ANTD_NETWORK:-default}"
      PROD_AUTONOMI_PEERS: "${PROD_AUTONOMI_PEERS:-}"
      ANT_PEERS: "${ANT_PEERS:-}"
      ANTD_REST_ADDR: "0.0.0.0:8082"
      ANTD_LOG_LEVEL: "${ANTD_LOG_LEVEL:-warn}"
      ANTD_REQUEST_TIMEOUT_SECONDS: "${ANTD_REQUEST_TIMEOUT_SECONDS:-60}"
      ANTD_FILE_UPLOAD_REQUEST_TIMEOUT_SECONDS: "${ANTD_FILE_UPLOAD_REQUEST_TIMEOUT_SECONDS:-3600}"
      ANTD_JSON_BODY_LIMIT_BYTES: "${ANTD_JSON_BODY_LIMIT_BYTES:-33554432}"
      ANTD_COST_CACHE_TTL_SECONDS: "${ANTD_COST_CACHE_TTL_SECONDS:-60}"
      ANTD_COST_CACHE_MAX_ENTRIES: "${ANTD_COST_CACHE_MAX_ENTRIES:-512}"
      ANTD_QUOTE_TIMEOUT_SECS: "${ANTD_QUOTE_TIMEOUT_SECS:-60}"
      ANTD_STORE_TIMEOUT_SECS: "${ANTD_STORE_TIMEOUT_SECS:-120}"
      ANTD_INTERNAL_TOKEN: "${ANTD_INTERNAL_TOKEN:?ANTD_INTERNAL_TOKEN is required in production}"
      EVM_NETWORK: "${PROD_EVM_NETWORK:-arbitrum-one}"
      PROD_EVM_RPC_URL: "${PROD_EVM_RPC_URL:-}"
      PROD_EVM_PAYMENT_TOKEN_ADDRESS: "${PROD_EVM_PAYMENT_TOKEN_ADDRESS:-}"
      PROD_EVM_PAYMENT_VAULT_ADDRESS: "${PROD_EVM_PAYMENT_VAULT_ADDRESS:-}"
    expose:
      - "8082"
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped

  rust_admin:
    depends_on:
      antd:
        condition: service_healthy
    environment:
      APP_ENV: "production"
      ANTD_URL: "http://antd:8082"
      ANTD_APPROVE_ON_STARTUP: "${ANTD_APPROVE_ON_STARTUP:-true}"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G

  rust_stream:
    depends_on:
      antd:
        condition: service_healthy
    environment:
      ANTD_URL: "http://antd:8082"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  react_frontend:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

  nginx:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
