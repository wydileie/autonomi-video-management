services:
  # This overlay is intended to be layered with docker-compose.monitoring.yml so
  # Grafana gets both the Prometheus dashboards and the Loki datasource.
  loki:
    image: "${LOKI_IMAGE:-grafana/loki:2.9.8}"
    container_name: autvid_loki
    command:
      - "-config.file=/etc/loki/config.yml"
    ports:
      - "${LOKI_HTTP_BIND:-127.0.0.1}:${LOKI_HTTP_PORT:-3100}:3100"
    networks:
      - appnet
    volumes:
      - ./monitoring/loki:/etc/loki:ro
      - loki_data:/loki
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  promtail:
    image: "${PROMTAIL_IMAGE:-grafana/promtail:2.9.8}"
    container_name: autvid_promtail
    command:
      - "-config.file=/etc/promtail/config.yml"
    depends_on:
      - loki
    ports:
      - "${PROMTAIL_HTTP_BIND:-127.0.0.1}:${PROMTAIL_HTTP_PORT:-9080}:9080"
    networks:
      - appnet
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/promtail:/etc/promtail:ro
      - promtail_positions:/run/promtail
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  grafana:
    depends_on:
      - prometheus
      - loki

volumes:
  grafana_data:
  loki_data:
  promtail_positions:
