services:
  backup_sidecar:
    image: autonomi-video-management-backup-sidecar
    build:
      context: ./backup_sidecar
    container_name: autvid_backup_sidecar
    environment:
      SQLITE_DB_PATH: /var/lib/autvid/autvid.sqlite3
      BACKUP_DIR: /backups
      BACKUP_PREFIX: "${BACKUP_PREFIX:-autvid}"
      BACKUP_SCHEDULE: "${BACKUP_SCHEDULE:-daily@02:00}"
      BACKUP_RUN_ON_START: "${BACKUP_RUN_ON_START:-false}"
      BACKUP_RETENTION_DAYS: "${BACKUP_RETENTION_DAYS:-14}"
      BACKUP_RETENTION_COUNT: "${BACKUP_RETENTION_COUNT:-0}"
      BACKUP_CATALOG: "${BACKUP_CATALOG:-true}"
      BACKUP_FILE_OWNER: "${BACKUP_FILE_OWNER:-}"
      BACKUP_SQLITE_WAIT_SECONDS: "${BACKUP_SQLITE_WAIT_SECONDS:-120}"
      BACKUP_TEXTFILE_DIR: "${BACKUP_TEXTFILE_DIR:-/var/lib/node_exporter/textfile_collector}"
      BACKUP_TEXTFILE_NAME: "${BACKUP_TEXTFILE_NAME:-autvid_backup.prom}"
      CATALOG_PATH: /var/lib/autvid/catalog/catalog.json
    networks:
      - appnet
    volumes:
      - ${BACKUP_HOST_PATH:-../backups}:/backups
      - ${AUTVID_DATA_HOST_PATH:-../.autvid/app_data}:/var/lib/autvid:ro
      - ${BACKUP_TEXTFILE_HOST_PATH:-./monitoring/textfile}:/var/lib/node_exporter/textfile_collector
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
