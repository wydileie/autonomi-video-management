repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
      - id: check-yaml
        args: [--unsafe]
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: ^deploy/backup_sidecar/.*\.sh$
  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend lint
        entry: npm --prefix apps/web run lint
        language: system
        pass_filenames: false
        files: ^apps/web/.*\.(ts|tsx|js|jsx|mjs|mts|css)$
      - id: frontend-format
        name: frontend format
        entry: npm --prefix apps/web run format:check
        language: system
        pass_filenames: false
        files: ^apps/web/.*\.(ts|tsx|js|jsx|mjs|mts|css|json|md)$
      - id: frontend-typecheck
        name: frontend typecheck
        entry: bash -c 'cd apps/web && npx tsc --noEmit'
        language: system
        pass_filenames: false
        files: ^apps/web/.*\.(ts|tsx|mts)$
      - id: rust-fmt
        name: rust fmt
        entry: cargo fmt --all --check
        language: system
        pass_filenames: false
        files: ^(crates|apps/desktop)/.*\.rs$|^Cargo\.toml$|^Cargo\.lock$
