name: Publish Images

"on":
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Publish ${{ matrix.title }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: rust-admin
            title: Rust admin
            description: Autonomi Video Management admin API
            context: .
            file: ./rust_admin/Dockerfile
          - image: rust-stream
            title: Rust stream
            description: Autonomi Video Management stream API
            context: .
            file: ./rust_stream/Dockerfile
          - image: antd-service
            title: antd service
            description: Autonomi Video Management production Autonomi gateway
            context: .
            file: ./antd_service/Dockerfile
          - image: nginx
            title: Nginx
            description: Autonomi Video Management reverse proxy
            context: ./nginx
            file: ./nginx/Dockerfile
          - image: react-frontend
            title: React frontend
            description: Autonomi Video Management browser UI
            context: ./react_frontend
            file: ./react_frontend/Dockerfile
          - image: postgres-init
            title: Postgres init
            description: Autonomi Video Management Postgres image with init scripts
            context: ./postgres-init
            file: ./postgres-init/Dockerfile
          - image: autonomi-devnet
            title: Autonomi devnet
            description: Autonomi Video Management local devnet and gateway
            context: .
            file: ./autonomi_devnet/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: image
        shell: bash
        env:
          IMAGE_SUFFIX: ${{ matrix.image }}
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          echo "name=${REGISTRY}/${repository}-${IMAGE_SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            latest=auto
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Autonomi Video Management ${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
