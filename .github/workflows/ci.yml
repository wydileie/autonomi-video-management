name: CI

on:
  push:
  pull_request:

jobs:
  rust-workspace:
    name: Rust workspace checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.1

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run cargo tests
        run: cargo test --workspace

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  cargo-deny:
    name: Cargo deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  desktop-check:
    name: Desktop app compile check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            protobuf-compiler

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: apps/desktop/src-tauri

      # tauri-build validates every configured externalBin and bundle
      # resource during cargo check; stage empty host-triple sidecars and an
      # empty frontend dist directory so a compile-only check can pass.
      - name: Stage dummy sidecars and frontend dist for compile check
        run: |
          triple=$(rustc -vV | sed -n 's/^host: //p')
          for name in antd rust_admin rust_stream ffmpeg ffprobe; do
            install -m 0755 /dev/null "apps/desktop/src-tauri/binaries/${name}-${triple}"
          done
          mkdir -p apps/web/build

      - name: Check desktop app
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

  rust-admin-db:
    name: Rust admin SQLite integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.1

      - name: Run rust_admin DB integration tests
        run: cargo test -p rust_admin --features db-tests db_tests -- --test-threads=1

  react-frontend:
    name: React frontend build and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Lint
        run: npm run lint
        working-directory: apps/web

      - name: Check formatting
        run: npm run format:check
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web

      - name: Run tests
        run: npm test
        working-directory: apps/web
        env:
          CI: "true"

      - name: Run coverage
        run: npm run test:coverage
        working-directory: apps/web
        env:
          CI: "true"

      - name: Upload frontend coverage
        uses: codecov/codecov-action@v7
        with:
          files: apps/web/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  coverage-rust:
    name: Rust coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate Rust coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload Rust coverage
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          flags: rust
          fail_ci_if_error: false

  compose-config:
    name: Compose config validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Render local Compose config
        run: docker compose --env-file .env.local.example -f deploy/docker-compose.yml -f deploy/docker-compose.local.yml config >/tmp/autvid-compose-local.yml

      - name: Render public local-devnet Compose config
        run: docker compose --env-file .env.local-public.example -f deploy/docker-compose.yml -f deploy/docker-compose.local.yml -f deploy/docker-compose.local-public.yml config >/tmp/autvid-compose-local-public.yml

      - name: Render production Compose config
        run: docker compose --env-file .env.production.example -f deploy/docker-compose.yml -f deploy/docker-compose.prod.yml config >/tmp/autvid-compose-prod.yml

  security-audit:
    name: Security audits (blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install React dependencies
        run: npm ci
        working-directory: apps/web

      - name: Run npm production audit
        run: npm audit --omit=dev
        working-directory: apps/web

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "1"

  image-scans:
    name: Blocking container image scans
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - tag: autvid-rust-admin:ci
            dockerfile: crates/rust_admin/Dockerfile
            context: .
          - tag: autvid-rust-stream:ci
            dockerfile: crates/rust_stream/Dockerfile
            context: .
          - tag: autvid-antd-service:ci
            dockerfile: crates/antd_service/Dockerfile
            context: .
          - tag: autvid-nginx:ci
            dockerfile: Dockerfile
            context: ./deploy/nginx
          - tag: autvid-react-frontend:ci
            dockerfile: Dockerfile
            context: ./apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image
        run: docker build -t "${{ matrix.image.tag }}" -f "${{ matrix.image.context }}/${{ matrix.image.dockerfile }}" "${{ matrix.image.context }}"

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.image.tag }}
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "1"
