name: CI

on:
  push:
  pull_request:

jobs:
  rust-workspace:
    name: Rust workspace checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.0

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run cargo tests
        run: cargo test --workspace

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  react-frontend:
    name: React frontend build and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: react_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: react_frontend

      - name: Build
        run: npm run build
        working-directory: react_frontend

      - name: Run tests
        run: npm test
        working-directory: react_frontend
        env:
          CI: "true"

  compose-config:
    name: Compose config validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Render local Compose config
        run: docker compose --env-file .env.local.example -f docker-compose.yml -f docker-compose.local.yml config >/tmp/autvid-compose-local.yml

      - name: Render public local-devnet Compose config
        run: docker compose --env-file .env.local-public.example -f docker-compose.yml -f docker-compose.local.yml -f docker-compose.local-public.yml config >/tmp/autvid-compose-local-public.yml

      - name: Render production Compose config
        run: docker compose --env-file .env.production.example -f docker-compose.yml -f docker-compose.prod.yml config >/tmp/autvid-compose-prod.yml

  advisory-scans:
    name: Advisory scans (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.0

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || echo "::warning::cargo-audit installation failed; Rust audit will be skipped"
        continue-on-error: true

      - name: Run cargo audit
        run: |
          if command -v cargo-audit >/dev/null 2>&1; then
            cargo audit
          else
            echo "::warning::cargo-audit is not installed; skipping Rust advisory scan"
          fi
        continue-on-error: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: react_frontend/package-lock.json

      - name: Install React dependencies
        run: npm ci
        working-directory: react_frontend

      - name: Run npm production audit
        run: npm audit --omit=dev
        working-directory: react_frontend
        continue-on-error: true

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "1"
