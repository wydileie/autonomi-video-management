name: CI

on:
  push:
  pull_request:

jobs:
  python-admin:
    name: Python admin tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python_admin/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r python_admin/requirements.txt

      - name: Run unit tests
        run: cd python_admin && python -m unittest discover -s tests -p "test*.py" -v

  rust-stream:
    name: Rust stream tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_stream

      - name: Run cargo tests
        run: cargo test
        working-directory: rust_stream

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: rust_stream

  react-frontend:
    name: React frontend build and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: react_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: react_frontend

      - name: Build
        run: npm run build
        working-directory: react_frontend

      - name: Run tests
        run: npm test
        working-directory: react_frontend
        env:
          CI: "true"
