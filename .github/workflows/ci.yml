name: CI

on:
  push:
  pull_request:

jobs:
  rust-admin:
    name: Rust admin tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.0
        with:
          workspaces: rust_admin

      - name: Run cargo tests
        run: cargo test
        working-directory: rust_admin

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: rust_admin

  rust-stream:
    name: Rust stream tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.0
        with:
          workspaces: rust_stream

      - name: Run cargo tests
        run: cargo test
        working-directory: rust_stream

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: rust_stream

  react-frontend:
    name: React frontend build and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: react_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: react_frontend

      - name: Build
        run: npm run build
        working-directory: react_frontend

      - name: Run tests
        run: npm test
        working-directory: react_frontend
        env:
          CI: "true"
