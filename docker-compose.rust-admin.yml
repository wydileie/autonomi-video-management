services:
  # Optional migration target for the admin API. Include this overlay only when
  # testing rust_admin parity; the default stack continues to route /api to
  # python_admin.
  rust_admin:
    build: ./rust_admin
    container_name: rust_admin
    environment:
      APP_ENV: "${APP_ENV:-development}"
      ADMIN_DB_HOST: db
      ADMIN_DB_PORT: "5432"
      ADMIN_DB_NAME: "${ADMIN_DB}"
      ADMIN_DB_USER: "${ADMIN_USER}"
      ADMIN_DB_PASS: "${ADMIN_PASS}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin}"
      ADMIN_AUTH_SECRET: "${ADMIN_AUTH_SECRET:-change-me}"
      ADMIN_AUTH_TTL_HOURS: "${ADMIN_AUTH_TTL_HOURS:-12}"
      ANTD_URL: "${ANTD_URL:-http://antd:8082}"
      ANTD_PAYMENT_MODE: "${ANTD_PAYMENT_MODE:-auto}"
      ANTD_APPROVE_ON_STARTUP: "${RUST_ADMIN_APPROVE_ON_STARTUP:-false}"
      UPLOAD_MAX_DURATION_SECONDS: "${UPLOAD_MAX_DURATION_SECONDS:-14400}"
      UPLOAD_MAX_SOURCE_PIXELS: "${UPLOAD_MAX_SOURCE_PIXELS:-33177600}"
      UPLOAD_MAX_SOURCE_LONG_EDGE: "${UPLOAD_MAX_SOURCE_LONG_EDGE:-7680}"
      HLS_SEGMENT_DURATION: "${HLS_SEGMENT_DURATION:-1}"
      UPLOAD_QUOTE_TRANSCODED_OVERHEAD: "${UPLOAD_QUOTE_TRANSCODED_OVERHEAD:-1.08}"
      UPLOAD_QUOTE_MAX_SAMPLE_BYTES: "${UPLOAD_QUOTE_MAX_SAMPLE_BYTES:-16777216}"
      FINAL_QUOTE_APPROVAL_TTL_SECONDS: "${FINAL_QUOTE_APPROVAL_TTL_SECONDS:-14400}"
      CATALOG_ADDRESS: "${CATALOG_ADDRESS:-}"
      CATALOG_STATE_PATH: "/catalog/catalog.json"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}"
      RUST_ADMIN_PORT: "8000"
      RUST_LOG: "info"
      UPLOAD_TEMP_DIR: "/var/lib/autvid/processing"
      TMPDIR: "/var/lib/autvid/processing"
      TMP: "/var/lib/autvid/processing"
      TEMP: "/var/lib/autvid/processing"
    depends_on:
      db:
        condition: service_healthy
      init_permissions:
        condition: service_completed_successfully
      antd:
        condition: service_healthy
    networks:
      - appnet
    expose:
      - "8000"
    ports:
      - "${RUST_ADMIN_HTTP_PORT:-8002}:8000"
    volumes:
      - ${VIDEO_PROCESSING_HOST_PATH:-./.autvid/video_processing}:/var/lib/autvid/processing
      - catalog_state:/catalog
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m

  nginx:
    image: autonomi-video-management-nginx-rust-admin
    build:
      context: ./nginx
      dockerfile: Dockerfile.rust-admin
    depends_on:
      rust_admin:
        condition: service_healthy
