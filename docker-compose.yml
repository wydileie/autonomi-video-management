services:

  # 1) Postgres
  db:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init/:/docker-entrypoint-initdb.d/:ro
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2) antd daemon — Autonomi network gateway (REST :8082, gRPC :50051)
  antd:
    build:
      context: ./antd_service
    container_name: antd_daemon
    environment:
      AUTONOMI_WALLET_KEY: "${AUTONOMI_WALLET_KEY}"
      ANTD_NETWORK: "${ANTD_NETWORK:-default}"
      ANTD_PEERS: "${AUTONOMI_PEERS:-}"
      ANTD_REST_ADDR: "0.0.0.0:8082"
      ANTD_GRPC_ADDR: "0.0.0.0:50051"
      ANTD_CORS: "true"
      EVM_RPC_URL: "${EVM_RPC_URL:-}"
      EVM_PAYMENT_TOKEN_ADDRESS: "${EVM_PAYMENT_TOKEN_ADDRESS:-}"
      EVM_PAYMENT_VAULT_ADDRESS: "${EVM_PAYMENT_VAULT_ADDRESS:-}"
    networks:
      - appnet
    expose:
      - "8082"
      - "50051"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # 3) Python Admin — video ingestion, FFmpeg transcoding, metadata API
  python_admin:
    build: ./python_admin
    container_name: python_admin
    environment:
      ADMIN_DB_HOST: db
      ADMIN_DB_PORT: "5432"
      ADMIN_DB_NAME: "${ADMIN_DB}"
      ADMIN_DB_USER: "${ADMIN_USER}"
      ADMIN_DB_PASS: "${ADMIN_PASS}"
      ANTD_URL: "http://antd:8082"
      ANTD_PAYMENT_MODE: "${ANTD_PAYMENT_MODE:-auto}"
      ANTD_APPROVE_ON_STARTUP: "${ANTD_APPROVE_ON_STARTUP:-true}"
      CATALOG_ADDRESS: "${CATALOG_ADDRESS:-}"
      CATALOG_STATE_PATH: "/catalog/catalog.json"
      RUST_STREAM_URL: "http://rust_stream:8081"
      UPLOAD_TEMP_DIR: "/tmp/video_uploads"
    depends_on:
      db:
        condition: service_healthy
      antd:
        condition: service_healthy
    networks:
      - appnet
    expose:
      - "8000"
    volumes:
      - video_tmp:/tmp/video_uploads
      - catalog_state:/catalog

  # 4) Rust streaming — HLS manifest generation + Autonomi segment proxy
  rust_stream:
    build: ./rust_stream
    container_name: rust_stream
    environment:
      ANTD_URL: "http://antd:8082"
      CATALOG_ADDRESS: "${CATALOG_ADDRESS:-}"
      CATALOG_STATE_PATH: "/catalog/catalog.json"
      RUST_LOG: "info"
    depends_on:
      antd:
        condition: service_healthy
    networks:
      - appnet
    expose:
      - "8081"
    volumes:
      - catalog_state:/catalog:ro

  # 5) React front end
  react_frontend:
    build:
      context: ./react_frontend
      args:
        REACT_APP_API_URL: "/api"
        REACT_APP_STREAM_URL: "/stream"
    container_name: react_app
    depends_on:
      - python_admin
      - rust_stream
    networks:
      - appnet
    expose:
      - "80"

  # 6) Nginx Reverse Proxy
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    depends_on:
      - python_admin
      - rust_stream
      - react_frontend
    volumes:
      - ./nginx/conf.d/:/etc/nginx/conf.d
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    networks:
      - appnet

  # 7) Certbot
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - nginx
    networks:
      - appnet
    entrypoint: /bin/bash

volumes:
  postgres_data:
  certbot-etc:
  certbot-var:
  video_tmp:
  catalog_state:

networks:
  appnet:
    driver: bridge
