services:

  # 1) Postgres
  db:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${HOST_WORKSPACE_DIR:-.}/postgres-init/:/docker-entrypoint-initdb.d/:ro
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2) Python Admin — video ingestion, FFmpeg transcoding, metadata API
  python_admin:
    build: ./python_admin
    container_name: python_admin
    environment:
      ADMIN_DB_HOST: db
      ADMIN_DB_PORT: "5432"
      ADMIN_DB_NAME: "${ADMIN_DB}"
      ADMIN_DB_USER: "${ADMIN_USER}"
      ADMIN_DB_PASS: "${ADMIN_PASS}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin}"
      ADMIN_AUTH_SECRET: "${ADMIN_AUTH_SECRET:-change-me}"
      ADMIN_AUTH_TTL_HOURS: "${ADMIN_AUTH_TTL_HOURS:-12}"
      ANTD_URL: "${ANTD_URL:-http://antd:8082}"
      ANTD_PAYMENT_MODE: "${ANTD_PAYMENT_MODE:-auto}"
      ANTD_UPLOAD_VERIFY: "${ANTD_UPLOAD_VERIFY:-true}"
      ANTD_UPLOAD_RETRIES: "${ANTD_UPLOAD_RETRIES:-3}"
      ANTD_UPLOAD_TIMEOUT_SECONDS: "${ANTD_UPLOAD_TIMEOUT_SECONDS:-120}"
      ANTD_APPROVE_ON_STARTUP: "${ANTD_APPROVE_ON_STARTUP:-true}"
      HLS_SEGMENT_DURATION: "${HLS_SEGMENT_DURATION:-1}"
      FFMPEG_THREADS: "${FFMPEG_THREADS:-2}"
      FFMPEG_FILTER_THREADS: "${FFMPEG_FILTER_THREADS:-1}"
      FINAL_QUOTE_APPROVAL_TTL_SECONDS: "${FINAL_QUOTE_APPROVAL_TTL_SECONDS:-14400}"
      APPROVAL_CLEANUP_INTERVAL_SECONDS: "${APPROVAL_CLEANUP_INTERVAL_SECONDS:-300}"
      CATALOG_ADDRESS: "${CATALOG_ADDRESS:-}"
      CATALOG_STATE_PATH: "/catalog/catalog.json"
      RUST_STREAM_URL: "http://rust_stream:8081"
      UPLOAD_TEMP_DIR: "/tmp/video_uploads"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet
    ports:
      - "${ADMIN_HTTP_PORT:-8000}:8000"
    volumes:
      - video_tmp:/tmp/video_uploads
      - catalog_state:/catalog

  # 3) Rust streaming — HLS manifest generation + Autonomi segment proxy
  rust_stream:
    build: ./rust_stream
    container_name: rust_stream
    environment:
      ANTD_URL: "${ANTD_URL:-http://antd:8082}"
      CATALOG_ADDRESS: "${CATALOG_ADDRESS:-}"
      CATALOG_STATE_PATH: "/catalog/catalog.json"
      RUST_LOG: "info"
    networks:
      - appnet
    ports:
      - "${STREAM_HTTP_PORT:-8081}:8081"
    volumes:
      - catalog_state:/catalog:ro

  # 4) React front end
  react_frontend:
    build:
      context: ./react_frontend
      args:
        REACT_APP_API_URL: "/api"
        REACT_APP_STREAM_URL: "/stream"
    container_name: react_app
    depends_on:
      - python_admin
      - rust_stream
    networks:
      - appnet
    expose:
      - "80"

  # 5) Nginx Reverse Proxy
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    depends_on:
      - python_admin
      - rust_stream
      - react_frontend
    volumes:
      - ${HOST_WORKSPACE_DIR:-.}/nginx/conf.d/:/etc/nginx/conf.d
    ports:
      - "${APP_HTTP_PORT:-80}:80"
    networks:
      - appnet

volumes:
  postgres_data:
  video_tmp:
  catalog_state:

networks:
  appnet:
    driver: bridge
